name: Deploy Flutter Web

on:
  push:
    branches: ["main", "master"]
    paths:
      - "lib/**"
      - "web/**"
      - "assets/**"
      - "pubspec.yaml"
      - "pubspec.lock"
      - "scripts/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

concurrency:
  group: deploy-flutter
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: [self-hosted, linux, satoori]
    env:
      DEPLOY_ROOT: /opt/protfolio/satoori
      API_BASE_URL: https://satoori-api.protfolio.store/api
      DOCKER_SUDO: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Verify Flutter
        run: flutter --version

      - name: Verify Docker
        run: |
          sudo docker --version
          sudo docker compose version

      - name: Deploy Flutter web
        run: bash scripts/deploy_flutter.sh
