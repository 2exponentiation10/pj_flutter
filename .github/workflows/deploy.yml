name: Deploy Flutter Web

on:
  push:
    branches: ["main", "master"]
    paths:
      - "lib/**"
      - "web/**"
      - "assets/**"
      - "pubspec.yaml"
      - "pubspec.lock"
      - "scripts/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

concurrency:
  group: deploy-flutter
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: [self-hosted, linux, satoori]
    env:
      DEPLOY_ROOT: /opt/protfolio/satoori
      API_BASE_URL: https://satoori-api.protfolio.store/api
      DOCKER_SUDO: "false"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        shell: bash
        run: |
          FLUTTER_HOME="$HOME/flutter-stable"
          if [ ! -x "$FLUTTER_HOME/bin/flutter" ]; then
            rm -rf "$FLUTTER_HOME"
            git clone --depth 1 --branch stable https://github.com/flutter/flutter.git "$FLUTTER_HOME"
          fi
          echo "$FLUTTER_HOME/bin" >> "$GITHUB_PATH"

      - name: Ensure unzip command
        shell: bash
        run: |
          mkdir -p "$HOME/.local/bin"
          cat > "$HOME/.local/bin/unzip" <<'EOF'
          #!/usr/bin/env python3
          import os
          import sys
          import zipfile

          args = sys.argv[1:]
          if not args:
            print("usage: unzip <zipfile> [-d dir]", file=sys.stderr)
            sys.exit(2)

          zip_path = None
          out_dir = "."
          i = 0
          while i < len(args):
            arg = args[i]
            if arg == "-d" and i + 1 < len(args):
              out_dir = args[i + 1]
              i += 2
              continue
            if arg.startswith("-"):
              i += 1
              continue
            if zip_path is None:
              zip_path = arg
            i += 1

          if zip_path is None:
            print("unzip shim: zip file argument is missing", file=sys.stderr)
            sys.exit(2)

          os.makedirs(out_dir, exist_ok=True)
          with zipfile.ZipFile(zip_path, "r") as zf:
            zf.extractall(out_dir)
            for info in zf.infolist():
              rel_path = info.filename
              if not rel_path or rel_path.endswith("/"):
                continue
              full_path = os.path.join(out_dir, rel_path)
              mode = (info.external_attr >> 16) & 0o777
              if mode:
                try:
                  os.chmod(full_path, mode)
                except OSError:
                  pass
          EOF
          chmod +x "$HOME/.local/bin/unzip"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Verify Flutter
        run: flutter --version

      - name: Verify Docker
        run: |
          docker --version
          docker compose version

      - name: Deploy Flutter web
        run: bash scripts/deploy_flutter.sh
