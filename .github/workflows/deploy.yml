name: Deploy Flutter Web

on:
  push:
    branches: ["main", "master"]
    paths:
      - "lib/**"
      - "web/**"
      - "assets/**"
      - "pubspec.yaml"
      - "pubspec.lock"
      - "scripts/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

concurrency:
  group: deploy-flutter
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: [self-hosted, linux, satoori]
    env:
      DEPLOY_ROOT: /opt/protfolio/satoori
      API_BASE_URL: https://satoori-api.protfolio.store/api
      DOCKER_SUDO: "false"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        shell: bash
        run: |
          FLUTTER_HOME="$HOME/flutter-stable"
          if [ ! -x "$FLUTTER_HOME/bin/flutter" ]; then
            rm -rf "$FLUTTER_HOME"
            git clone --depth 1 --branch stable https://github.com/flutter/flutter.git "$FLUTTER_HOME"
          fi
          echo "$FLUTTER_HOME/bin" >> "$GITHUB_PATH"

      - name: Install unzip
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip

      - name: Verify Flutter
        run: flutter --version

      - name: Verify Docker
        run: |
          docker --version
          docker compose version

      - name: Deploy Flutter web
        run: bash scripts/deploy_flutter.sh
